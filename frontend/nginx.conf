server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SvelteKit SPA fallback: unknown paths resolve to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API access — proxy to the backend container on the compose network.
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploaded menu item photos, served by the backend from the same volume as the DB.
    location /uploads/ {
        proxy_pass http://backend:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
